<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newage Education - Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm border-bottom border-danger border-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="#">🎓 Newage Education | <span class="text-danger">Employee Portal</span></a>
            <a href="login.html" class="btn btn-sm btn-outline-danger fw-bold">Logout</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-7 mb-4">
                <div class="card shadow border-0 border-top border-dark border-4">
                    <div class="card-header bg-dark text-white fw-bold border-bottom border-danger border-2">Assigned Tasks from CEO</div>
                    <div class="card-body bg-white">
                        <h5 class="text-danger fw-bold">Task: Check Student Documents</h5>
                        <p class="text-dark">CEO apnake Sakib-er IELTS ebong HSC document verify korar task diyechen.</p>
                        <hr class="border-danger">
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark">Work Update / Details</label>
                                <textarea class="form-control border-dark" rows="3" placeholder="Kaj koto tuku hoyeche seta ekhane likhun..."></textarea>
                            </div>
                            <button type="button" class="btn btn-danger fw-bold px-4">Submit Work to CEO</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card shadow border-0 border-top border-danger border-4">
                    <div class="card-header bg-danger text-white fw-bold">➕ Student Data Entry</div>
                    <div class="card-body bg-white">
                        <p class="text-muted small fw-bold">Notun student-ke portal-e add korar jonno application form fill-up korun.</p>
                        <!-- Ekhane link add kora hoyeche -->
                        <a href="application_form.html" class="btn btn-dark w-100 fw-bold py-2 mt-3">📝 Open Application Form</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
