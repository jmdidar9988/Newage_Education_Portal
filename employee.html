<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newage Education - Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Black Navbar with Red Border -->
    <nav class="navbar navbar-dark bg-dark shadow-sm border-bottom border-danger border-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="#">🎓 Newage Education | <span class="text-danger">Employee Portal</span></a>
            <a href="login.html" class="btn btn-sm btn-outline-danger fw-bold">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row">
            
            <!-- Left Column: Task Management (Kaj submit korar jayga) -->
            <div class="col-md-7 mb-4">
                <div class="card shadow border-0 border-top border-dark border-4">
                    <div class="card-header bg-dark text-white fw-bold border-bottom border-danger border-2">
                        Assigned Tasks from CEO
                    </div>
                    <div class="card-body bg-white">
                        <h5 class="text-danger fw-bold">Task: Check Student Documents</h5>
                        <p class="text-dark">CEO apnake Sakib-er IELTS ebong HSC document verify korar task diyechen. Doyakore time-er moddhe submit korun.</p>
                        <hr class="border-danger">
                        
                        <!-- Work Submission Form -->
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark">Work Update / Details</label>
                                <textarea class="form-control border-dark" rows="3" placeholder="Kaj koto tuku hoyeche seta ekhane likhun..."></textarea>
                            </div>
                            <!-- Submit korle CEO er kache message chole jabe -->
                            <button type="button" class="btn btn-danger fw-bold px-4">Submit Work to CEO</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right Column: Student Data Entry Option (Shudhu Employee/CEO dekhbe) -->
            <div class="col-md-5">
                <div class="card shadow border-0 border-top border-danger border-4">
                    <div class="card-header bg-danger text-white fw-bold">
                        ➕ Student Data Entry
                    </div>
                    <div class="card-body bg-white">
                        <p class="text-muted small fw-bold">Ei form diye notun student-ke portal-e add korun.</p>
                        
                        <!-- Data Entry Form -->
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark">Student Name</label>
                                <input type="text" class="form-control border-dark" placeholder="e.g. Rakib Hasan">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark">Qualification</label>
                                <input type="text" class="form-control border-dark" placeholder="e.g. HSC, IELTS (7.0)">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-dark">Target Country</label>
                                <select class="form-select border-dark">
                                    <option>UK</option>
                                    <option>USA</option>
                                    <option>Canada</option>
                                    <option>Australia</option>
                                    <option>Hungary</option>
                                </select>
                            </div>
                            <button type="button" class="btn btn-dark w-100 fw-bold">Add Student</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
