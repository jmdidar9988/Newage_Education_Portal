<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newage Education - Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark shadow-sm border-bottom border-danger border-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="#">🎓 Newage Education | <span class="text-danger">Data Entry Portal</span></a>
            <div>
                <!-- Dashbord e ferot jabar button -->
                <a href="employee.html" class="btn btn-sm btn-outline-light me-2">Back to Dashboard</a>
                <a href="login.html" class="btn btn-sm btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Form Container -->
    <div class="container mt-4 mb-5">
        <div class="card shadow-lg border-0 border-top border-danger border-4">
            
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <h3 class="fw-bold mb-0 text-danger">APPLICATION FORM</h3>
                <div class="d-flex align-items-center">
                    <label class="me-2 fw-bold text-light">Date:</label>
                    <input type="date" class="form-control form-control-sm border-danger">
                </div>
            </div>

            <div class="card-body bg-white px-5">
                <form>
                    <!-- Personal Info Section -->
                    <div class="mb-4">
                        <h5 class="fw-bold text-white bg-dark p-2 rounded text-center mb-3 border-start border-danger border-4" style="width: 250px; margin: 0 auto;">Personal Info</h5>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="fw-bold text-dark">Name</label>
                                <input type="text" class="form-control border-dark">
                            </div>
                            <div class="col-md-4">
                                <label class="fw-bold text-dark">Date of Birth</label>
                                <input type="date" class="form-control border-dark">
                            </div>
                            <div class="col-md-4">
                                <label class="fw-bold text-dark">Contact</label>
                                <input type="text" class="form-control border-dark">
                            </div>
                            <div class="col-md-4">
                                <label class="fw-bold text-dark">Email</label>
                                <input type="email" class="form-control border-dark">
                            </div>
                            <div class="col-md-4">
                                <label class="fw-bold text-dark">Post Code</label>
                                <input type="text" class="form-control border-dark">
                            </div>
                            <div class="col-md-4">
                                <label class="fw-bold text-dark">Gender</label>
                                <select class="form-select border-dark">
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="col-md-8">
                                <label class="fw-bold text-dark">Address</label>
                                <input type="text" class="form-control border-dark">
                            </div>
                        </div>
                    </div>

                    <!-- Educational Info Section -->
                    <div class="mb-4 mt-5">
                        <h5 class="fw-bold text-white bg-dark p-2 rounded text-center mb-3 border-start border-danger border-4" style="width: 250px; margin: 0 auto;">Educational Info</h5>
                        <div class="table-responsive">
                            <table class="table table-bordered border-dark text-center align-middle">
                                <thead class="table-dark text-danger">
                                    <tr>
                                        <th>Degree</th>
                                        <th>Result</th>
                                        <th>Passing Year</th>
                                        <th>Subject / Major</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="fw-bold">S.S.C</td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                    </tr>
                                    <tr>
                                        <td class="fw-bold">H.S.C</td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                    </tr>
                                    <tr>
                                        <td class="fw-bold">Bachelor</td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                    </tr>
                                    <tr>
                                        <td class="fw-bold">Master</td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                        <td><input type="text" class="form-control form-control-sm border-dark"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- English Language & Preferences -->
                    <div class="row mt-5">
                        <!-- Left Column -->
                        <div class="col-md-6 pe-md-4">
                            <!-- English Language -->
                            <h5 class="fw-bold text-white bg-dark p-2 rounded text-center mb-3 border-start border-danger border-4" style="width: 200px; margin: 0 auto;">English Language</h5>
                            <div class="mb-2">
                                <label class="fw-bold text-dark">Test Name :</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>
                            <div class="mb-2">
                                <label class="fw-bold text-dark">Date :</label>
                                <input type="date" class="form-control form-control-sm border-dark">
                            </div>
                            <div class="mb-3">
                                <label class="fw-bold text-dark">Overall Score :</label>
                                <input type="text" class="form-control form-control-sm border-dark w-50">
                            </div>
                            <label class="fw-bold text-dark">Individual scores:</label>
                            <div class="d-flex gap-2 text-center">
                                <div><label class="small fw-bold">L</label><input type="text" class="form-control form-control-sm border-dark"></div>
                                <div><label class="small fw-bold">R</label><input type="text" class="form-control form-control-sm border-dark"></div>
                                <div><label class="small fw-bold">W</label><input type="text" class="form-control form-control-sm border-dark"></div>
                                <div><label class="small fw-bold">S</label><input type="text" class="form-control form-control-sm border-dark"></div>
                            </div>

                            <!-- Course Preferences -->
                            <h5 class="fw-bold text-white bg-dark p-2 rounded text-center mt-5 mb-3 border-start border-danger border-4" style="width: 150px; margin: 0 auto;">Course</h5>
                            <div class="mb-2">
                                <label class="fw-bold text-dark small">1st Choice:</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>
                            <div class="mb-2">
                                <label class="fw-bold text-dark small">2nd Choice:</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div class="col-md-6 ps-md-4 border-start border-danger">
                            <!-- Country Preferences -->
                            <h5 class="fw-bold text-white bg-dark p-2 rounded text-center mb-3 border-start border-danger border-4" style="width: 150px; margin: 0 auto;">Country</h5>
                            <div class="mb-2">
                                <label class="fw-bold text-dark small">1st Choice:</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>
                            <div class="mb-2">
                                <label class="fw-bold text-dark small">2nd Choice:</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold text-dark small">3rd Choice:</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>

                            <!-- University Preferences -->
                            <h5 class="fw-bold text-white bg-dark p-2 rounded text-center mt-4 mb-3 border-start border-danger border-4" style="width: 150px; margin: 0 auto;">University</h5>
                            <div class="mb-2">
                                <label class="fw-bold text-dark small">1st Choice:</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>
                            <div class="mb-2">
                                <label class="fw-bold text-dark small">2nd Choice:</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold text-dark small">3rd Choice:</label>
                                <input type="text" class="form-control form-control-sm border-dark">
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <hr class="border-danger mt-5">
                    <div class="text-center">
                        <button type="button" class="btn btn-danger btn-lg px-5 fw-bold shadow">Save Student Application Data</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

</body>
</html>
