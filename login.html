<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newage Education - Login</title>
    <!-- Nicher line tai holo Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 rounded-lg mt-5">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h3 class="font-weight-light my-2">🎓 Newage Education</h3>
                        <p class="mb-0">Portal Login</p>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" class="form-control" placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Enter password">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Login As</label>
                                <select class="form-select">
                                    <option value="ceo">CEO</option>
                                    <option value="receptionist">Receptionist</option>
                                    <option value="employee">Employee / Counselor</option>
                                    <option value="student">Student</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <a href="index.html" class="btn btn-primary btn-lg">Login</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
