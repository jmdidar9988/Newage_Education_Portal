<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newage Education - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 border-top border-danger border-4 rounded-lg mt-5">
                    <div class="card-header bg-dark text-white text-center py-4">
                        <h3 class="font-weight-light my-2 text-danger fw-bold">🎓 Newage Education</h3>
                        <p class="mb-0 text-light">Portal Login</p>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email address</label>
                                <input type="email" class="form-control border-dark" placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control border-dark" placeholder="Enter password">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-danger">Login As</label>
                                <!-- ID add kora hoyeche jate JavaScript eta dhorte pare -->
                                <select class="form-select border-danger" id="roleSelect">
                                    <option value="ceo">CEO</option>
                                    <option value="employee">Employee / Counselor</option>
                                    <option value="student">Student</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <!-- href theke link shoriye onclick add kora hoyeche -->
                                <button type="button" onclick="loginCheck()" class="btn btn-danger btn-lg fw-bold">Login</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chotto JavaScript Trick -->
    <script>
        function loginCheck() {
            var selectedRole = document.getElementById("roleSelect").value;
            
            if (selectedRole === "ceo") {
                window.location.href = "index.html";
            } else if (selectedRole === "employee") {
                window.location.href = "employee.html";
            } else if (selectedRole === "student") {
                window.location.href = "student.html";
            }
        }
    </script>

</body>
</html>
